[project]
name = "ohm-renderer"
version = "0.1.0"
description = "Mistletoe-Renderer und -Token für den DARCdown-Markdown-Dialekt."
readme = "README.md"
authors = [
    { name = "Tim Grelka", email = "tim@grelka.net" }
]
requires-python = ">=3.12"
dependencies = [
    "jinja2==3.1.6",
    "mistletoe==1.4.0",
]

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"
