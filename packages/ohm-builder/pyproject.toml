[project]
name = "ohm-builder"
version = "0.1.0"
description = "Build-Logik für den 50ohm.de-Generator."
readme = "README.md"
authors = [
    { name = "Tim Grelka", email = "tim@grelka.net" }
]
requires-python = ">=3.12"
dependencies = [
    "jinja2==3.1.6",
    "ohm-renderer",
    "rich>=14.2.0",
    "tqdm==4.67.1",
]

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
ohm-renderer = { workspace = true }
